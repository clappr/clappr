<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Clappr DASH</title>

  <script src="./clappr.js"></script>
  <script src="../../dash-shaka-playback/dist/dash-shaka-playback.js"></script>
  <script src="../../dash-shaka-playback/dist/dash-shaka-telemetry-plugin.js"></script>
  <script>console.log('✅ dash-shaka-telemetry-plugin.js carregado');</script>

  <style>
    body {
      background: #111;
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* container visual */
    .player-wrapper {
      width: 900px;
      max-width: 95vw;
    }

    /* título simples */
    .player-title {
      margin-bottom: 10px;
      font-size: 18px;
      opacity: 0.8;
    }

    /* player precisa de tamanho */
    #player {
      width: 100%;
      height: 500px;
      background: black;
      border-radius: 8px;
      overflow: hidden;
    }
  </style>
</head>

<body>

  <div class="player-wrapper">
    <div class="player-title">Clappr + DASH (Shaka)</div>
    <div id="player"></div>
  </div>

  <script>
    console.log('📍 Iniciando player...');
    console.log('Clappr disponível?', typeof Clappr !== 'undefined');
    console.log('DashShakaPlayback disponível?', typeof DashShakaPlayback !== 'undefined');
    console.log('ShakaNetworkAdapterPlugin disponível?', typeof ShakaNetworkAdapterPlugin !== 'undefined');
    class SimpleTelemetryLogger extends Clappr.ContainerPlugin {
      get name() { return 'simple_telemetry_logger' }

      bindEvents() {
        this.listenTo(
          this.container,
          'telemetry:trace',
          (envelope) => {
            if (envelope.type === 'container:telemetry:request:start') {
              console.log('✅ TELEMETRY START', envelope)
            } else if (envelope.type === 'container:telemetry:request:end') {
              console.log('✅ TELEMETRY END', envelope)
            }
          }
        )
      }
    }


    var player = new Clappr.Player({
      parentId: '#player',
      source: 'https://storage.googleapis.com/shaka-demo-assets/angel-one/dash.mpd',
      plugins: [DashShakaPlayback, ShakaNetworkAdapterPlugin, SimpleTelemetryLogger],
      telemetry: { shakaNetwork: { enabled: true } },
      width: '100%',
      height: '100%'
    });

    console.log('✅ Player criado');

    player.on('ready', function () {
      console.log('✅ Player READY');
    });

    player.on('play', function () {
      console.log('▶️ Playing');
    });

    player.on('error', function (error) {
      console.error('❌ Player Error:', error);
    });
  </script>

</body>

</html>
